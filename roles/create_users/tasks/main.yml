---
- name: Load vault variables
  include_vars:
    file: group_vars/all/vault.yml
  no_log: true

- name: Ensure docker group exists
  group:
    name: docker
    state: present

- name: Create users and generate SSH keys
  user:
    name: "{{ item.name }}"
    password: "{{ item.password | password_hash('sha512') }}"
    groups: docker
    append: yes
    generate_ssh_key: yes
    ssh_key_bits: 2048
    ssh_key_type: rsa
    ssh_key_file: "/home/{{ item.name }}/.ssh/id_rsa"
  loop: "{{ users }}"
  no_log: true

- name: Wait for SSH keys to be created
  wait_for:
    path: "/home/{{ item.name }}/.ssh/id_rsa.pub"
    state: present
    timeout: 10
  loop: "{{ users }}"

- name: Add public key to authorized_keys
  ansible.posix.authorized_key:
    user: "{{ item.name }}"
    state: present
    key: "{{ lookup('file', '/home/' + item.name + '/.ssh/id_rsa.pub') }}"
  loop: "{{ users }}"
  no_log: true
